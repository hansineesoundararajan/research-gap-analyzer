services:
  - type: web
    name: research-gap-analyzer
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python telegram_bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TELEGRAM_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: NUM_PAPERS
        value: "3"
      - key: TELEGRAM_MODE
        value: polling
      - key: WEBHOOK_PATH
        value: telegram-webhook
      - key: LOG_LEVEL
        value: INFO
